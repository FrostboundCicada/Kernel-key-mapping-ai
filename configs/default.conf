# Kernel-key-mapping-ai 默认配置
# 注释以 # 开头。坐标为屏幕绝对像素坐标。

# 屏幕分辨率
screen 1080 2400

# 驱动选择: auto | twt | input
#   auto  — 自动探测（优先 twt，其次 rt/qx/zero 等 aim_touch 风格）
#   twt   — 仅用 TwT 驱动（支持多 slot + 陀螺仪，反检测最强）
#   input — 仅用 aim_touch 风格驱动（rt/qx/zero/ovo/hakutaku）
driver auto

# 鼠标移动映射模式: drag | gyro
#   drag — 鼠标位移驱动一个触摸点拖拽（适合压枪/拖动准星）
#   gyro — 鼠标位移转陀螺仪角速度（仅 twt 后端，FPS 视角转动，无触摸事件）
mouse_mode gyro

# drag 模式像素缩放
sensitivity 1.2

# gyro 模式灵敏度（1 像素位移 → 角速度系数）
gyro_sensitivity 8.0

# ── 按键映射 ──────────────────────────────────
# 格式: key <KEY名> <动作> <x> <y>
#   动作: click(短按一次) | hold(按住触摸,松开抬起) | toggle(按一次切换)
# 字母键
key KEY_W hold 540 1700
key KEY_A hold 360 1700
key KEY_S hold 540 1900
key KEY_D hold 720 1700
key KEY_SPACE click 540 1300
key KEY_R click 540 2050
key KEY_Q click 200 1700
key KEY_E click 880 1700
key KEY_F click 540 1500
key KEY_LEFTSHIFT toggle 540 2050

# 鼠标按键
# 开火 / 瞄准（坐标设在屏幕右侧开火键位置）
mouse_left hold 920 2050
mouse_right hold 540 1200
mouse_middle click 540 1500
